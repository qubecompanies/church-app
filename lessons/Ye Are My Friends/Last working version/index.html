<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ye Are My Friends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#080e1a;--navy-mid:#0c1527;--gold:#f5b942;--gold-soft:#f8ce7a;--gold-dim:rgba(245,185,66,0.12);--teal:#4ecdc4;--purple:#7c6caf;--coral:#e07c5a;--cream:#f0ead6;--cream-dim:#9e9a8e;--glass:rgba(12,21,39,0.7);--glass-light:rgba(240,234,214,0.06);--glass-border:rgba(240,234,214,0.1);--radius:18px;--radius-sm:12px;--font-d:'Cormorant Garamond',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;--mystery-blur:20px}
html,body{height:100%;width:100%;font-family:var(--font-b);background:var(--navy);color:var(--cream);overflow:hidden;-webkit-font-smoothing:antialiased}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{display:none;height:100vh;height:100dvh;width:100vw;position:fixed;top:0;left:0;z-index:1}.screen.active{display:flex;flex-direction:column}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes wordPop{0%{opacity:0;transform:scale(0) rotate(-8deg)}60%{transform:scale(1.15) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes cardFloat{0%{opacity:0;transform:translateY(40px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes barGrow{from{width:0%}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes phonePulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(78,205,196,.4)}50%{transform:scale(1.02);box-shadow:0 0 0 12px rgba(78,205,196,0)}}
@keyframes dots{0%,20%{opacity:0}40%{opacity:1}100%{opacity:0}}
@keyframes successBurst{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes timerShrink{from{width:100%}to{width:0%}}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes badgePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}50%{transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes badgeFade{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
@keyframes emojiRise{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:1}100%{opacity:0;transform:translateY(-70vh) scale(.6)}}
@keyframes countBump{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.fade-in{animation:fadeIn .6s ease forwards;opacity:0}

/* Mystery Reveal */
#mystery-bar{position:fixed;top:0;left:0;right:0;z-index:8;text-align:center;padding:6px 16px;background:linear-gradient(var(--navy),transparent);pointer-events:none;display:none}
#mystery-bar.visible{display:block}
.mystery-img{width:100%;max-width:500px;height:80px;object-fit:cover;border-radius:8px;filter:blur(var(--mystery-blur));transition:filter 1.5s ease;opacity:.85;border:1px solid rgba(245,185,66,.15)}
/* Scripture split slide */
.scripture-split{display:flex;align-items:center;justify-content:center;max-width:860px;width:100%;z-index:1;padding:1rem}
.scripture-left{flex:1;text-align:right;padding:0 32px}
.scripture-left-text{font-family:var(--font-d);font-size:clamp(1.4rem,3vw,2rem);font-style:italic;font-weight:400;color:rgba(240,234,214,.7);line-height:1.5;margin-bottom:12px}
.scripture-left-ref{font-size:1rem;color:var(--gold-soft)}
.scripture-divider{width:2px;background:var(--gold);min-height:140px;flex-shrink:0;border-radius:1px;box-shadow:0 0 16px rgba(245,185,66,.4);opacity:0;transition:opacity 1s ease}
.scripture-divider.show{opacity:1}
.scripture-right{flex:1;text-align:left;padding:0 32px;opacity:0;transform:translateX(24px);transition:opacity 1s ease .2s,transform 1s ease .2s}
.scripture-right.show{opacity:1;transform:translateX(0)}
.scripture-theme{font-family:var(--font-d);font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:700;color:var(--cream);line-height:1.25;margin:0}
.scripture-theme-gold{color:var(--gold);margin-top:8px}
@media(max-width:600px){.scripture-split{flex-direction:column;gap:24px;text-align:center}.scripture-left,.scripture-right{text-align:center;padding:0 16px}.scripture-divider{width:60%;height:2px;min-height:2px}}
/* Photo slide */
.photo-container{display:flex;align-items:center;justify-content:center;gap:32px;max-width:820px;width:100%;z-index:1;padding:1rem}
.photo-img{width:45%;max-width:340px;border-radius:var(--radius);border:1px solid rgba(240,234,214,.12);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.photo-quote{width:50%;text-align:left}
.photo-label{font-size:.85rem;color:var(--gold);text-transform:uppercase;letter-spacing:2.5px;font-weight:700;margin-bottom:14px}
.photo-text{font-family:var(--font-d);font-size:clamp(1.3rem,3vw,1.9rem);font-style:italic;line-height:1.55;margin-bottom:14px;color:var(--cream)}
.photo-text em{color:var(--gold);font-style:italic}
.photo-ref{font-size:1rem;color:var(--cream-dim)}
/* Closing full reveal */
.closing-painting{width:100%;max-width:600px;border-radius:var(--radius);margin-bottom:1.5rem;border:1px solid rgba(245,185,66,.2);box-shadow:0 8px 60px rgba(245,185,66,.15);animation:fadeIn 1.5s ease forwards}
@media(max-width:600px){.photo-container{flex-direction:column;gap:20px}.photo-img{width:80%}.photo-quote{width:100%;text-align:center}}

/* Timer Bar */
.timer-track{width:100%;height:6px;background:var(--glass-light);border-radius:3px;margin-bottom:1.2rem;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;will-change:width}
.timer-fill.warning{background:linear-gradient(90deg,var(--coral),var(--gold));animation:timerPulse .5s ease-in-out infinite}

/* Achievement Badge */
#badge-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:60;pointer-events:none;display:none}
#badge-overlay.active{display:block}
.badge-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(12,21,39,.95);border:2px solid var(--gold);border-radius:var(--radius);padding:28px 40px;text-align:center;backdrop-filter:blur(16px);animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 0 60px rgba(245,185,66,.2)}
.badge-icon{font-size:3rem;margin-bottom:8px}
.badge-title{font-family:var(--font-d);font-size:1.8rem;font-weight:700;color:var(--cream);margin-bottom:4px}
.badge-sub{font-size:.9rem;color:var(--gold-soft)}

/* Emoji Float Container */
#emoji-container{position:fixed;bottom:0;left:0;right:0;top:0;z-index:7;pointer-events:none;overflow:hidden;display:none}
#emoji-container.active{display:block}
.emoji-float{position:absolute;bottom:-40px;font-size:2rem;animation:emojiRise 3s ease-out forwards;pointer-events:none}

/* Emoji Panel (participant) */
.emoji-panel{display:flex;justify-content:center;gap:16px;margin-top:1.5rem}
.emoji-btn{font-size:2.2rem;background:var(--glass-light);border:1.5px solid var(--glass-border);border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,box-shadow .15s}
.emoji-btn:active{transform:scale(1.2);box-shadow:0 0 20px rgba(245,185,66,.3)}

/* Transition Overlay */
#transition-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(12,21,39,.97) 0%,rgba(8,14,26,.99) 100%);flex-direction:column;gap:16px}
#transition-overlay.active{display:flex}
.transition-text{font-family:var(--font-d);font-size:clamp(2rem,6vw,3.8rem);font-weight:700;color:var(--cream);text-align:center;padding:0 2rem;animation:scaleIn .6s cubic-bezier(.34,1.56,.64,1) forwards;text-shadow:0 0 60px rgba(245,185,66,.3)}
.transition-dots{display:flex;gap:8px;margin-top:12px}
.transition-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:.3;animation:pulse 1.2s ease-in-out infinite}
.transition-dot:nth-child(2){animation-delay:.2s}.transition-dot:nth-child(3){animation-delay:.4s}

/* Response Counter */
.response-counter{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:1rem}
.counter-number{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;background:var(--gold-dim);border:2px solid rgba(245,185,66,.3);font-size:1.5rem;font-weight:700;color:var(--gold)}.counter-number.bump{animation:countBump .3s ease}
.counter-label{font-size:1rem;color:var(--cream-dim)}

/* Landing */
#landing-screen{align-items:center;justify-content:center}
.landing-inner{text-align:center;padding:2rem;max-width:440px;z-index:1;position:relative}
.landing-icon{font-size:3rem;margin-bottom:.6rem;animation:float 4s ease-in-out infinite}
.landing-title{font-family:var(--font-d);font-size:clamp(2.4rem,7vw,3.6rem);font-weight:700;line-height:1.1;margin-bottom:.3rem}
.landing-ref{font-family:var(--font-d);font-style:italic;color:var(--gold-soft);font-size:1.05rem;margin-bottom:2.2rem}
.landing-btns{display:flex;flex-direction:column;gap:12px}
.landing-btn{display:block;padding:17px 28px;border-radius:var(--radius);font-family:var(--font-b);font-size:1.05rem;font-weight:600;cursor:pointer;border:none;transition:transform .15s}
.landing-btn:active{transform:scale(.97)}
.landing-btn.gold{background:linear-gradient(135deg,var(--gold),#e0a030);color:var(--navy);box-shadow:0 4px 24px rgba(245,185,66,.3)}
.landing-btn.glass{background:var(--glass-light);color:var(--cream);border:1.5px solid var(--glass-border)}
.landing-btn.teal-outline{background:transparent;color:var(--teal);border:1.5px solid rgba(78,205,196,.3)}
.landing-divider{font-size:.75rem;color:var(--cream-dim);text-transform:uppercase;letter-spacing:3px;margin:6px 0}

/* Join */
#join-screen{align-items:center;justify-content:center;z-index:1}
.join-inner{text-align:center;padding:2rem;max-width:400px;z-index:1;position:relative}
.join-inner h2{font-family:var(--font-d);font-size:2rem;font-weight:600;margin-bottom:1.5rem}
.join-input-group{display:flex;gap:10px;margin-bottom:.8rem}
.join-input{flex:1;padding:14px 18px;border-radius:var(--radius-sm);border:1.5px solid rgba(240,234,214,.2);background:var(--glass);color:var(--cream);font-size:1.5rem;font-family:var(--font-b);text-align:center;letter-spacing:8px;font-weight:700;outline:none}
.join-input:focus{border-color:var(--gold)}.join-input::placeholder{color:var(--cream-dim);letter-spacing:2px;font-weight:400;font-size:1rem}
.join-go{padding:14px 22px;border-radius:var(--radius-sm);background:var(--gold);color:var(--navy);font-weight:700;font-size:1.1rem;border:none;cursor:pointer;font-family:var(--font-b)}
.join-error{color:var(--coral);font-size:.9rem;min-height:1.4em}
.join-back{margin-top:1.5rem;background:none;border:none;color:var(--cream-dim);cursor:pointer;font-size:.95rem;font-family:var(--font-b);text-decoration:underline}

/* Host Display */
#host-screen{z-index:1}
#host-display{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem;padding-top:50px;overflow-y:auto;position:relative;z-index:1}
.lobby-container{text-align:center;width:100%;max-width:520px;position:relative;z-index:1}
.lobby-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:350px;height:350px;background:radial-gradient(circle,rgba(245,185,66,.1) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.lobby-title{font-family:var(--font-d);font-size:clamp(2.6rem,5.5vw,4.2rem);font-weight:700;margin-bottom:.3rem}
.lobby-subtitle{color:var(--cream-dim);font-size:1.1rem;margin-bottom:2rem}
.join-info{background:var(--glass-light);border:1px solid var(--glass-border);border-radius:var(--radius);padding:2rem;backdrop-filter:blur(12px);margin-bottom:1.5rem}
.qr-wrapper{display:inline-block;padding:14px;background:var(--cream);border-radius:var(--radius-sm);margin-bottom:1.2rem}.qr-wrapper canvas,.qr-wrapper img{display:block}
.code-display{margin-bottom:.8rem}.code-label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--cream-dim);margin-bottom:4px}
.code-value{font-size:3rem;font-weight:700;letter-spacing:12px;color:var(--gold)}
.join-url{font-size:.72rem;color:var(--cream-dim);word-break:break-all}
.participant-counter{font-size:1rem;color:var(--teal);display:flex;align-items:center;justify-content:center;gap:8px}
.counter-icon{animation:pulse 2s ease-in-out infinite;font-size:.6rem}

/* Teaching */
.teaching-container{text-align:center;max-width:720px;width:100%;position:relative;padding:1rem;z-index:1}
.teaching-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:400px;height:300px;background:radial-gradient(circle,rgba(245,185,66,.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.scripture-block{background:var(--glass-light);border:1px solid var(--glass-border);border-radius:var(--radius);padding:3rem 2.5rem 2.5rem;margin-bottom:2rem;position:relative;backdrop-filter:blur(12px)}
.scripture-mark{font-family:var(--font-d);font-size:5.5rem;color:var(--gold);opacity:.3;position:absolute;top:-12px;left:22px;line-height:1}
.scripture-text{font-family:var(--font-d);font-size:clamp(1.7rem,4.2vw,2.8rem);font-style:italic;font-weight:600;line-height:1.4;margin-bottom:.8rem}
.scripture-ref{font-family:var(--font-b);font-size:.95rem;color:var(--gold-soft);font-weight:500}
.teaching-body{font-size:1.3rem;line-height:1.6;color:var(--cream-dim);max-width:600px;margin:0 auto}

/* Closing */
.closing-container{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;max-width:700px;width:100%;z-index:1}
.closing-title{font-family:var(--font-d);font-size:clamp(2.8rem,7vw,5rem);font-weight:700;margin-bottom:1.5rem;text-shadow:0 0 80px rgba(245,185,66,.2)}
.closing-scripture{margin-bottom:2rem}
.closing-message{font-size:1.5rem;color:var(--gold-soft);font-style:italic;font-family:var(--font-d);font-weight:600}

/* Activity */
.activity-container{width:100%;max-width:820px;display:flex;flex-direction:column;align-items:center;text-align:center;max-height:100%;z-index:1}
.activity-tag{display:inline-block;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--gold);background:var(--gold-dim);padding:6px 16px;border-radius:20px;margin-bottom:.8rem}
.activity-prompt{font-family:var(--font-d);font-size:clamp(1.7rem,4vw,2.6rem);font-weight:600;line-height:1.35;margin-bottom:1.2rem;max-width:680px}
.results-area{width:100%;flex:1;min-height:0;overflow-y:auto}

/* Poll */
.poll-results{width:100%;max-width:640px;margin:0 auto}
.poll-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.poll-label{min-width:200px;text-align:right;font-size:1.15rem;font-weight:500;flex-shrink:0;white-space:nowrap}
.poll-bar-track{flex:1;height:48px;background:var(--glass-light);border-radius:10px;overflow:hidden;border:1px solid var(--glass-border)}
.poll-bar{height:100%;border-radius:10px;min-width:3px;animation:barGrow .8s cubic-bezier(.25,.46,.45,.94) forwards;position:relative;overflow:hidden}
.poll-bar::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite}
.poll-count{width:80px;text-align:left;font-weight:700;font-size:1.2rem;flex-shrink:0}.poll-pct{font-weight:400;color:var(--cream-dim);font-size:.8rem}

/* Word Cloud */
.wordcloud{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:12px 20px;padding:1rem;max-height:55vh;overflow-y:auto}
.cloud-word{font-family:var(--font-d);font-weight:700;display:inline-block;animation:wordPop .5s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;text-shadow:0 0 30px currentColor;cursor:default;transition:transform .2s}.cloud-word:hover{transform:scale(1.1)}

/* Text Responses */
.text-responses{display:flex;flex-direction:column;align-items:center;gap:20px;max-height:55vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:8px;width:100%}
.text-card{background:linear-gradient(135deg,rgba(245,185,66,.06),rgba(240,234,214,.04));border:1px solid rgba(245,185,66,.15);border-radius:var(--radius);padding:24px 28px;width:100%;max-width:520px;text-align:center;animation:cardFloat .7s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;position:relative;box-shadow:0 4px 30px rgba(245,185,66,.08)}
.text-responses::-webkit-scrollbar{display:none}
.text-card::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);border-radius:2px}
.text-card p{font-size:1.3rem;line-height:1.5;font-family:var(--font-d);font-style:italic;font-weight:400}

/* Participant */
#participant-screen{z-index:1}#participant-display{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;z-index:1;position:relative}
.p-waiting{text-align:center;max-width:320px}
.p-check{width:64px;height:64px;border-radius:50%;background:rgba(78,205,196,.12);color:var(--teal);font-size:1.8rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;animation:successBurst .5s ease forwards}
.p-listen-icon{font-size:2.8rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
.p-waiting h2{font-family:var(--font-d);font-size:1.6rem;margin-bottom:.5rem}
.p-waiting p{color:var(--cream-dim);line-height:1.5}
.p-dots span{animation:dots 1.5s ease-in-out infinite;font-size:2rem;color:var(--gold)}.p-dots span:nth-child(2){animation-delay:.3s}.p-dots span:nth-child(3){animation-delay:.6s}
.p-teaser{margin-top:1.2rem;font-size:.85rem;color:var(--gold-soft);font-style:italic;font-family:var(--font-d)}
.p-activity{width:100%;max-width:400px;text-align:center}
.p-prompt{font-family:var(--font-d);font-size:1.35rem;font-weight:600;line-height:1.4;margin-bottom:1.5rem}
.p-options{display:flex;flex-direction:column;gap:10px}
.p-option-btn{padding:16px 20px;border-radius:var(--radius-sm);border:1.5px solid var(--glass-border);background:var(--glass-light);color:var(--cream);font-size:1rem;font-weight:500;font-family:var(--font-b);cursor:pointer;transition:all .2s;text-align:left;animation:phonePulse 2.5s ease-in-out infinite}
.p-option-btn:active{background:var(--gold);color:var(--navy);border-color:var(--gold);transform:scale(.97);animation:none}
.p-input-group{display:flex;flex-direction:column;gap:10px}
.p-text-input{padding:14px 16px;border-radius:var(--radius-sm);border:1.5px solid rgba(240,234,214,.2);background:var(--glass);color:var(--cream);font-size:1.15rem;font-family:var(--font-b);outline:none;text-align:center}
.p-text-input:focus{border-color:var(--gold)}.p-text-input::placeholder{color:var(--cream-dim)}
.p-textarea{padding:14px 16px;border-radius:var(--radius-sm);border:1.5px solid rgba(240,234,214,.2);background:var(--glass);color:var(--cream);font-size:1rem;font-family:var(--font-b);outline:none;resize:none}
.p-textarea:focus{border-color:var(--gold)}.p-textarea::placeholder{color:var(--cream-dim)}
.p-submit-btn{padding:15px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#e0a030);color:var(--navy);font-weight:700;font-size:1.1rem;border:none;cursor:pointer;font-family:var(--font-b);box-shadow:0 4px 16px rgba(245,185,66,.25);transition:transform .15s}.p-submit-btn:active{transform:scale(.96)}

/* Controller */
#controller-screen{z-index:1}#controller-display{flex:1;display:flex;flex-direction:column;z-index:1;position:relative;overflow:hidden}
.ctrl-scroll{flex:1;overflow-y:auto;padding:16px 16px 90px}
.ctrl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ctrl-step-badge{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--cream-dim);background:var(--glass-light);padding:5px 12px;border-radius:20px}

.ctrl-display-preview{font-size:.75rem;color:var(--cream-dim);background:var(--glass-light);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctrl-display-preview span{color:var(--teal)}

/* Confetti canvas */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:55;pointer-events:none;display:none}

/* Phone sparkle */

@keyframes sparkle2{0%{opacity:0;transform:translate(0,0) scale(0)}50%{opacity:1;transform:translate(22px,-20px) scale(1.2)}100%{opacity:0;transform:translate(35px,-35px) scale(0)}}
@keyframes sparkle3{0%{opacity:0;transform:translate(0,0) scale(0)}50%{opacity:1;transform:translate(-15px,18px) scale(.8)}100%{opacity:0;transform:translate(-25px,30px) scale(0)}}
@keyframes sparkle4{0%{opacity:0;transform:translate(0,0) scale(0)}50%{opacity:1;transform:translate(18px,15px) scale(1)}100%{opacity:0;transform:translate(28px,28px) scale(0)}}
@keyframes sparkle5{0%{opacity:0;transform:translate(0,0) scale(0)}50%{opacity:1;transform:translate(0,-30px) scale(1.1)}100%{opacity:0;transform:translate(5px,-45px) scale(0)}}
.p-check-wrap{position:relative;display:inline-block}

.sparkle.s2{background:#4ecdc4;animation:sparkle2 .7s ease forwards .15s;opacity:0}

.sparkle.s4{background:#e07c5a;animation:sparkle4 .7s ease forwards .12s;opacity:0}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--coral);color:#fff;padding:12px 24px;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;opacity:0;transition:opacity .3s,transform .3s;z-index:100;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){.poll-row{flex-wrap:wrap;gap:6px}.poll-label{width:100%;text-align:left;font-size:.88rem}.poll-count{width:auto}#host-display{padding:1.2rem;padding-top:45px}.scripture-text{font-size:1.5rem!important}.lobby-title{font-size:2.2rem!important}.activity-prompt{font-size:1.5rem!important}}

<body>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,setDoc,getDoc,onSnapshot,addDoc,getDocs,deleteDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyAa-V12j-ASGLqpcDU4MN-20uTzsxMh6sk",authDomain:"church-lessons-24392.firebaseapp.com",projectId:"church-lessons-24392",storageBucket:"church-lessons-24392.firebasestorage.app",messagingSenderId:"122319599653",appId:"1:122319599653:web:7719cd478da5d40b59a7cc"});
const db=getFirestore(app);
let S={role:null,code:null,ref:null,act:0,pid:null,submitted:new Set(),unsub1:null,unsub2:null,pcount:0};
let joinMode='participant',transTimer=null,timerInterval=null,shownBadges=new Set();

// Particles
(function(){const c=document.getElementById('particles'),x=c.getContext('2d');let W,H;function r(){W=c.width=innerWidth;H=c.height=innerHeight}r();addEventListener('resize',r);const ps=Array.from({length:45},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,vy:-(Math.random()*.3+.1),vx:(Math.random()-.5)*.15,o:Math.random()*.4+.1,h:40+Math.random()*20}));function d(){x.clearRect(0,0,W,H);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.y<-10){p.y=H+10;p.x=Math.random()*W}if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`hsla(${p.h},80%,65%,${p.o})`;x.shadowBlur=p.r*6;x.shadowColor=`hsla(${p.h},80%,65%,${p.o*.5})`;x.fill()});x.shadowBlur=0;requestAnimationFrame(d)}d()})();

// Activities
const A=[
{id:'lobby',type:'lobby',script:'Have everyone scan the QR code on the screen. Once most are connected, tap Next to begin.\n\nTip: Call out the count: "We\'ve got 12\u2026 18\u2026 25 \u2014 looking good!"'},
{id:'poll1',type:'poll',transition:'Let\u2019s start with a question\u2026',title:'Quick Question',prompt:'How many \u201Cfriends\u201D or followers do you have across ALL your social media?',options:['0 \u2013 100','100 \u2013 500','500 \u2013 1,000','1,000+'],timer:30,script:'Say: "Grab your phones \u2014 first question. How many friends or followers do you have on social media? Be honest!"\n\nLet results build. Then:\n"Wow! Some of you are basically influencers. OK \u2014 now the REAL question\u2026"',nextTeaser:'Now the real question\u2026'},
{id:'poll2',type:'poll',transition:'Now\u2026 be honest.',title:'Now Be Honest',prompt:'How many of those people would you actually call at 2 AM if you were really scared or hurting?',options:['Zero','1 \u2013 2','3 \u2013 5','More than 5'],timer:30,script:'Say: "Same phones. Out of ALL those followers \u2014 how many would you actually call at 2 AM if you were scared?"\n\nWait for results. Then:\n"Look at that difference. Hundreds of followers, but maybe one or two real ones.\n\nThe world says friends are about likes and follows. The Savior sees it completely differently\u2026"',nextTeaser:'He calls you something powerful\u2026'},
{id:'teaching1',type:'teaching',title:'We Are His Friends',scripture:'\u201CYe are they whom my Father hath given me; ye are my friends.\u201D',reference:'Doctrine & Covenants 84:63',body:'In 1832, when the early Saints were facing intense persecution, the Lord addressed them three times as \u201Cmy friends.\u201D',script:'Say: "In 1832, when the Saints were being persecuted, the Lord spoke to them. He didn\'t call them servants or followers. Three times, He called them \'my friends.\'"\n\nRead D&C 84:63 from the screen together.\n\nAsk: "What does it mean that He calls you friend \u2014 especially when life is hard?"\n\nLet 2\u20133 respond. Then: "The God of the universe calls YOU His friend."',nextTeaser:'Your turn \u2014 one word.'},
{id:'wordcloud',type:'wordcloud',transition:'Your turn.',title:'One Word',prompt:'In ONE word \u2014 what does a TRUE friend do?',timer:45,candy:true,scriptureText:'\u201CGreater love hath no man than this, that a man lay down his life for his friends.\u201D',scriptureRef:'John 15:13',script:'Say: "One word. What does a TRUE friend do? Don\'t overthink it \u2014 just send it."\n\nRead standout words aloud:\n"Look at these \u2014 love, sacrifice, show up, stay."\n\n\uD83C\uDF6C Toss candy for 2\u20133 best answers. "Who said [word]?"\n\nThen John 15:13: "The ultimate friend sacrifices everything. That\'s what Christ did."',nextTeaser:'Different is the point.'},
{id:'john1513',type:'scriptureSplit',transition:'Greater love\u2026',title:'Greater Love',scripture:'\u201CGreater love hath no man than this, that a man lay down his life for his friends.\u201D',reference:'John 15:13',themeA:'That\u2019s not a social media thing.',themeB:'That\u2019s a covenant thing.',script:'Read the scripture from the screen together.\n\nPause. Let it sit for a moment.\n\nThen say: "The ultimate friend is someone who would sacrifice everything for you."\n\n\u2B50 TAP THE "REVEAL" BUTTON BELOW.\n\n[The theme phrase animates onto the screen]\n\nLet them read it. Then:\n"That\u2019s what Christ did. Not a follower thing. Not a likes thing. A covenant thing."',nextTeaser:'Different is the point.'},
{id:'teaching2',type:'teaching',title:'We Are One in Him',scripture:'\u201CBe one; and if ye are not one ye are not mine.\u201D',reference:'Doctrine & Covenants 38:27',body:'Jesus picked 12 Apostles who were completely different \u2014 fishermen, a tax collector, a zealot, brothers nicknamed \u201CSons of Thunder.\u201D',candy:true,script:'\uD83C\uDF6C CANDY OBJECT LESSON:\n\nHold up assorted candy bars.\n"Quick \u2014 which is the BEST candy bar?"\n[Let them argue 15 seconds]\n\n"When Jesus called His Apostles, He didn\'t pick twelve of the same guy. Fishermen, a tax collector, a radical, \'Sons of Thunder.\'\n\nLike these candy bars \u2014 each different. But together?"\n[Dump into one bowl]\n"Best Halloween haul ever."\n\n[Hand out candy bars]\n\nRead D&C 38:27 together.',nextTeaser:'What would YOU do?'},
{id:'scenario1',type:'scenario',transition:'What would YOU do?',title:'Scenario #1',prompt:'A new kid shows up at school and sits alone at lunch. You\u2019re with your friend group. What do you do?',options:['Invite them to sit with us','Wave and smile, but stay put','Wait for someone else to go','I\u2019ve been that kid \u2014 I go'],timer:30,script:'Say: "Scenario on your phones. Vote honestly \u2014 no wrong answers."\n\nAfter results:\n"Jesus never waited for someone else to go first. He always went to the one. He didn\'t wave \u2014 He went."',nextTeaser:'One more\u2026'},
{id:'scenario2',type:'scenario',title:'Scenario #2',prompt:'Your friend posts something online and gets roasted \u2014 dozens of mean comments. What\u2019s your move?',options:['DM them privately','Defend them publicly','Stay out of it','Report the comments'],timer:30,script:'Say: "One more \u2014 vote honestly."\n\nAfter results:\n"Every choice except \'stay out of it\' is an act of friendship.\n\nElder Buckner was in a room with a cardinal, rabbi, imam, and pastor during COVID. All different. But they stopped looking AT each other and started looking HEAVENWARD WITH each other."',nextTeaser:'This one matters.'},
{id:'lookUp',type:'photo',title:'Don\u2019t Look Around. Look Up.',transition:'Don\u2019t look around\u2026',script:'After sharing the Elder Buckner NYC story, say:\n"This sign hangs in our home. It reminds our family of the same thing those faith leaders learned:\n\nDon\u2019t look around. Look up.\n\nWhen we stop comparing, judging, and dividing \u2014 and instead look heavenward together \u2014 that\u2019s when we become one."\n\nLet the image sit for a moment. Then tap Next.',nextTeaser:'You belong.'},
{id:'teaching3',type:'teaching',title:'We Belong to Him',scripture:'\u201CCome unto me, all ye that labour and are heavy laden, and I will give you rest.\u201D',reference:'Matthew 11:28',body:'In Ghana, when you arrive at a home or church, they greet you: \u201CYou are welcome\u201D and \u201CYou are invited.\u201D Said with purpose. Said with love.',script:'Say: "In Ghana, they greet you with: \'You are welcome\' and \'You are invited.\' With real love.\n\nWe put \'Visitors Welcome\' on our doors. But do we really welcome everyone?\n\nElder Buckner\'s father said: \'Sitting in a pew doesn\'t make you a good Christian any more than sleeping in a garage makes you a car.\'"\n[Let them laugh]\n\n"It\'s about how we live \u2014 at school, the lunch table, the group chat."\n\nRead Matthew 11:28.',nextTeaser:'Share something real.'},
{id:'belonging',type:'text',transition:'Share something real.',title:'Share Anonymously',prompt:'Think of a time someone made you feel like you truly BELONGED. What did they do?',emoji:true,script:'Say: "Completely anonymous. Think of a time someone made you feel you truly belonged. What did they do? Type it and send."\n\n\u2B50 SPIRITUAL PEAK.\n\nRead responses slowly. Let each land.\n\nAfter a few: "These are real. You have the power to BE this person."\n\nKids can send emoji reactions \u2014 let the hearts flow.\n\nGive 60\u201390 seconds.',nextTeaser:'One last thing.'},
{id:'commitment',type:'poll',transition:'One last thing.',title:'Your Commitment',prompt:'This week, I commit to\u2026',options:['Reach out to someone sitting alone','Be a better listener to a friend','Welcome someone new at church','Stand up for someone'],timer:30,script:'Say: "Last one. This week, ONE thing you\'ll commit to."\n\nAfter results:\n"Look at that. THIS is who we are. This is what it means to be His friends."'},
{id:'closing',type:'closing',title:'Ye Are My Friends',scripture:'\u201CYe are my friends.\u201D',reference:'John 15:14 \u2022 D&C 84:63',script:'Close with your testimony.\n\n"He calls YOU His friend. Not your followers. Not your likes. YOU.\n\nNow go be that kind of friend this week."\n\n\uD83D\uDE4F Bear testimony.'}
];

// Filter
const BW=new Set(['ass','asshole','bastard','bitch','bloody','bollocks','crap','damn','dick','douche','fag','fuck','fucking','hell','idiot','jerk','moron','nigga','nigger','piss','poop','pussy','retard','shit','slut','stupid','suck','sucks','tit','tits','twat','whore','wtf','stfu','dumbass','jackass','motherfucker','butthole','boob','boobs','penis','vagina','sex','sexy','horny','nude','naked','thot','hoe','skank','trash','loser','lesbo','tranny','cunt','cock','wanker','arse','shag','bugger']);
function clean(t){return!t.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).some(w=>BW.has(w))}

// Utilities
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id)?.classList.add('active')}
window.showScreen=showScreen;
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

// Mystery Reveal
function updateMystery(){
  const bar=document.getElementById('mystery-bar');
  if(S.role!=='host'){bar.classList.remove('visible');return}
  if(S.act===0||A[S.act]?.type==='closing'){bar.classList.remove('visible');return}
  bar.classList.add('visible');
  const blur=Math.max(0,20-S.act*(20/(A.length-2)));
  document.documentElement.style.setProperty('--mystery-blur',blur+'px');
}

// Timer
function startTimer(seconds){
  clearInterval(timerInterval);
  const track=document.getElementById('timer-track');
  const fill=document.getElementById('timer-fill');
  if(!track||!fill)return;
  track.style.display='block';
  fill.style.transition='none';fill.style.width='100%';
  fill.classList.remove('warning');
  requestAnimationFrame(()=>{
    fill.style.transition=`width ${seconds}s linear`;
    fill.style.width='0%';
  });
  const warnAt=seconds*1000*0.25;
  timerInterval=setTimeout(()=>{fill.classList.add('warning')},seconds*1000-warnAt);
}
function stopTimer(){clearInterval(timerInterval);const t=document.getElementById('timer-track');if(t)t.style.display='none'}

// Achievement Badges
function showBadge(icon,title,sub){
  const o=document.getElementById('badge-overlay');
  o.innerHTML=`<div class="badge-card"><div class="badge-icon">${icon}</div><div class="badge-title">${title}</div><div class="badge-sub">${sub}</div></div>`;
  o.classList.add('active');
  fireConfetti();
  setTimeout(()=>{const card=o.querySelector('.badge-card');if(card)card.style.animation='badgeFade .4s ease forwards'},2600);
  setTimeout(()=>o.classList.remove('active'),3000);
}
function fireConfetti(){
  const cv=document.getElementById('confetti-canvas'),cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;cv.style.display='block';
  const colors=['#f5b942','#4ecdc4','#7c6caf','#e07c5a','#f0ead6','#f8ce7a'];
  const pieces=Array.from({length:80},()=>({x:innerWidth/2+(Math.random()-.5)*200,y:innerHeight/2-50,vx:(Math.random()-.5)*12,vy:-(Math.random()*8+4),w:Math.random()*8+4,h:Math.random()*4+2,c:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rv:(Math.random()-.5)*8,g:.25+Math.random()*.15}));
  let frame=0;
  function draw(){cx.clearRect(0,0,cv.width,cv.height);pieces.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vx*=.99;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,1-frame/90);cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore()});frame++;if(frame<100)requestAnimationFrame(draw);else{cx.clearRect(0,0,cv.width,cv.height);cv.style.display='none'}}draw();
}
function checkBadges(actId,count){
  if(actId==='poll1'&&count>=10&&!shownBadges.has('first10')){shownBadges.add('first10');showBadge('\u26A1','Quick Start!','10+ responses')}
  if(actId==='poll1'&&count>=S.pcount&&S.pcount>=5&&!shownBadges.has('full1')){shownBadges.add('full1');showBadge('\uD83C\uDF89','Full House!','Everyone voted')}
  if(actId==='poll2'&&count>=S.pcount&&S.pcount>=5&&!shownBadges.has('full2')){shownBadges.add('full2');showBadge('\uD83D\uDE4C','All In!','Full participation')}
  if(actId==='wordcloud'&&count>=15&&!shownBadges.has('words15')){shownBadges.add('words15');showBadge('\u2728','Word Power!','15+ unique words')}
  if(actId==='wordcloud'&&count>=25&&!shownBadges.has('words25')){shownBadges.add('words25');showBadge('\uD83D\uDD25','On Fire!','25+ words')}
  if(actId==='scenario1'&&count>=S.pcount&&S.pcount>=5&&!shownBadges.has('fulls1')){shownBadges.add('fulls1');showBadge('\uD83D\uDCAF','100%!','Every voice heard')}
  if(actId==='belonging'&&count>=5&&!shownBadges.has('belong5')){shownBadges.add('belong5');showBadge('\uD83D\uDC99','Opening Up','Stories are flowing')}
  if(actId==='belonging'&&count>=15&&!shownBadges.has('belong15')){shownBadges.add('belong15');showBadge('\uD83D\uDC9B','Hearts Open','15+ stories shared')}
  if(actId==='belonging'&&count>=25&&!shownBadges.has('belong25')){shownBadges.add('belong25');showBadge('\uD83C\uDF1F','All Hearts In','25+ stories')}
  if(actId==='commitment'&&count>=10&&!shownBadges.has('commit10')){shownBadges.add('commit10');showBadge('\uD83D\uDCAA','Committed!','10+ promises made')}
  if(actId==='commitment'&&count>=S.pcount&&S.pcount>=5&&!shownBadges.has('commitAll')){shownBadges.add('commitAll');showBadge('\uD83C\uDFC6','ALL IN!','Every. Single. Person.')}
}

// Emoji Reactions
function spawnEmoji(emoji){
  const c=document.getElementById('emoji-container');
  if(!c)return;c.classList.add('active');
  const el=document.createElement('div');
  el.className='emoji-float';el.textContent=emoji;
  el.style.left=(10+Math.random()*80)+'%';
  el.style.animationDuration=(2.5+Math.random()*1.5)+'s';
  c.appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

// Transitions
function showTrans(text,cb){const o=document.getElementById('transition-overlay'),t=document.getElementById('transition-text');t.textContent=text;t.style.animation='none';t.offsetHeight;t.style.animation='scaleIn .6s cubic-bezier(.34,1.56,.64,1) forwards';o.classList.add('active');clearTimeout(transTimer);transTimer=setTimeout(()=>{o.classList.remove('active');if(cb)cb()},2800)}

// Firebase
async function createSession(){const code=String(Math.floor(1000+Math.random()*9000));S.code=code;S.role='host';S.act=0;S.ref=doc(db,'ye-are-my-friends',code);await setDoc(S.ref,{currentActivity:0,createdAt:serverTimestamp(),participantCount:0});const u=new URL(location);u.searchParams.set('host',code);history.replaceState({},'',u);showScreen('host-screen');renderLobby();listen();listenR()}
async function rejoinHost(c){S.code=c;S.role='host';S.ref=doc(db,'ye-are-my-friends',c);const s=await getDoc(S.ref);if(!s.exists()){showScreen('landing-screen');return}S.act=s.data().currentActivity||0;S.pcount=s.data().participantCount||0;showScreen('host-screen');renderHost();listen();listenR()}
async function joinCtrl(c){S.code=c;S.role='controller';S.ref=doc(db,'ye-are-my-friends',c);const s=await getDoc(S.ref);if(!s.exists()){document.getElementById('join-error').textContent='Session not found.';return}S.act=s.data().currentActivity||0;S.pcount=s.data().participantCount||0;const u=new URL(location);u.searchParams.set('control',c);history.replaceState({},'',u);showScreen('controller-screen');renderCtrl();listen()}
async function joinPart(c){S.code=c;S.role='participant';S.pid='p_'+Math.random().toString(36).substr(2,9);S.ref=doc(db,'ye-are-my-friends',c);const s=await getDoc(S.ref);if(!s.exists()){document.getElementById('join-error').textContent='Session not found.';return}await setDoc(S.ref,{participantCount:(s.data().participantCount||0)+1},{merge:true});showScreen('participant-screen');listen()}

function listen(){if(S.unsub1)S.unsub1();S.unsub1=onSnapshot(S.ref,sn=>{if(!sn.exists())return;const d=sn.data();const changed=S.act!==d.currentActivity;S.act=d.currentActivity||0;S.pcount=d.participantCount||0;if(S.role==='host'){renderHost();updateMystery()}if(S.role==='controller')renderCtrl();if(S.role==='participant')renderPart()})}

function listenR(){if(S.unsub2)S.unsub2();S.unsub2=onSnapshot(collection(S.ref,'responses'),sn=>{if(S.role!=='host')return;const a=A[S.act];if(!a)return;const res=[],emojis=[];
  sn.forEach(d=>{const dd=d.data();if(dd.activityId===a.id)res.push(dd)});
  renderRes(a,res);checkBadges(a.id,res.length);
  sn.docChanges().forEach(ch=>{if(ch.type==='added'){const dd=ch.doc.data();if(dd.activityId===a.id+'-emoji')spawnEmoji(dd.value)}});
})}

async function advance(dir=1){const n=S.act+dir;if(n<0||n>=A.length)return;stopTimer();const a=A[n];
  // Optimistic local update for controller
  if(S.role==='controller'){S.act=n;renderCtrl()}
  if(dir>0&&a.transition){showTrans(a.transition,async()=>{await setDoc(S.ref,{currentActivity:n,themeRevealed:false},{merge:true})})}
  else{await setDoc(S.ref,{currentActivity:n,themeRevealed:false},{merge:true})}}

function listenReveal(){if(S.role!=='host')return;onSnapshot(S.ref,sn=>{if(!sn.exists())return;const d=sn.data();if(d.themeRevealed){const div=document.getElementById('scripture-divider');const right=document.getElementById('scripture-right');if(div)div.classList.add('show');if(right)right.classList.add('show')}})}
async function revealTheme(){await setDoc(S.ref,{themeRevealed:true},{merge:true})}
async function submit(id,v){if(S.submitted.has(id))return;if(!clean(v)){toast("Let's keep it uplifting! Try again.");return}S.submitted.add(id);await addDoc(collection(S.ref,'responses'),{activityId:id,value:v,participantId:S.pid,timestamp:serverTimestamp()});renderPart()}
const EMOJI_MAP={heart:'\u2764\uFE0F',pray:'\uD83D\uDE4F',flex:'\uD83D\uDCAA',fire:'\uD83D\uDD25'};
async function sendEmoji(key){const emoji=EMOJI_MAP[key]||key;await addDoc(collection(S.ref,'responses'),{activityId:A[S.act].id+'-emoji',value:emoji,participantId:S.pid,timestamp:serverTimestamp()})}
async function resetSession(){const resp=collection(S.ref,'responses');const sn=await getDocs(resp);const dels=[];sn.forEach(d=>dels.push(deleteDoc(d.ref)));await Promise.all(dels);await setDoc(S.ref,{currentActivity:0,participantCount:S.pcount,createdAt:serverTimestamp(),themeRevealed:false});S.act=0;S.submitted.clear();shownBadges.clear();S.lastResCount={};stopTimer();if(S.role==='controller')renderCtrl();if(S.role==='host')renderHost()}

// Host Rendering
function renderLobby(){const url=location.href.split('?')[0]+'?join='+S.code;document.getElementById('host-display').innerHTML=`<div class="lobby-container fade-in"><div class="lobby-glow"></div><h1 class="lobby-title">Ye Are My Friends</h1><p class="lobby-subtitle">Scan to join the lesson</p><div class="join-info"><div class="qr-wrapper" id="qr-target"></div><div class="code-display"><span class="code-label">Session Code</span><span class="code-value">${S.code}</span></div><div class="join-url">${url}</div></div><div class="participant-counter"><span class="counter-icon">\u25CF</span><span id="host-pcount">${S.pcount}</span> connected</div></div>`;const q=document.getElementById('qr-target');if(q&&typeof QRCode!=='undefined')new QRCode(q,{text:url,width:220,height:220,colorDark:'#0f1d32',colorLight:'#f0ead6'});updateMystery()}

function renderRes(a,res){const area=document.getElementById('results-area');if(!area)return;
  const rc=document.getElementById('resp-count');if(rc){const prev=parseInt(rc.textContent)||0;rc.textContent=res.length;if(res.length>prev){rc.classList.remove('bump');void rc.offsetHeight;rc.classList.add('bump')}}
  const colors=['#4ecdc4','#f5b942','#7c6caf','#e07c5a'];
  if(a.type==='poll'||a.type==='scenario'){const counts={};a.options.forEach((_,i)=>counts[i]=0);res.forEach(r=>{const i=parseInt(r.value);if(!isNaN(i))counts[i]++});const total=res.length||1;let h='<div class="poll-results">';a.options.forEach((opt,i)=>{const pct=Math.round((counts[i]/total)*100);h+=`<div class="poll-row fade-in" style="animation-delay:${i*.12}s"><div class="poll-label">${opt}</div><div class="poll-bar-track"><div class="poll-bar" style="width:${pct}%;background:${colors[i]};animation-delay:${i*.15}s"></div></div><div class="poll-count">${counts[i]} <span class="poll-pct">(${pct}%)</span></div></div>`});h+='</div>';area.innerHTML=h}
  if(a.type==='wordcloud'){const freq={};res.forEach(r=>{const w=r.value.trim().toLowerCase().replace(/[^a-z'\-]/g,'');if(w)freq[w]=(freq[w]||0)+1});const mx=Math.max(...Object.values(freq),1);const words=Object.entries(freq).sort((a,b)=>b[1]-a[1]);let h='<div class="wordcloud">';words.forEach(([w,c],i)=>{const sz=22+(c/mx)*68;h+=`<span class="cloud-word" style="font-size:${sz}px;color:${colors[i%colors.length]};animation-delay:${i*.06}s">${w}</span> `});h+='</div>';area.innerHTML=h}
  if(a.type==='text'){res.sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0));let h='<div class="text-responses">';res.forEach((r,i)=>{h+=`<div class="text-card" style="animation-delay:${i*.1}s"><p>${esc(r.value)}</p></div>`});h+='</div>';area.innerHTML=h;const c=area.querySelector('.text-responses');if(c)c.scrollTop=c.scrollHeight}
}

// Controller
function renderCtrl(){const a=A[S.act];if(!a)return;const isF=S.act===0,isL=S.act===A.length-1;
  const tl={lobby:'Lobby',teaching:'Teaching Moment',closing:'Closing',poll:'Live Poll',scenario:'Scenario Vote',wordcloud:'Word Cloud',text:'Text Responses',photo:'Photo Moment',scriptureSplit:'Scripture Moment'};
  // Display preview
  let displayInfo='Showing: ';
  if(a.type==='lobby')displayInfo+='QR code + join screen';
  else if(a.type==='teaching')displayInfo+='Scripture \u2014 '+a.reference;
  else if(a.type==='closing')displayInfo+='Final slide';
  else displayInfo+=a.title+(a.timer?' (\u23F1 '+a.timer+'s timer)':'');
  let extras='';
  if(a.type==='scriptureSplit')extras+=`<button class="ctrl-reveal-btn" onclick="window._reveal()">\u2728 Reveal Theme</button>`;
  if(a.candy)extras+=`<div class="ctrl-candy-cue">\uD83C\uDF6C Candy moment \u2014 see script</div>`;
  if(a.scriptureText)extras+=`<div class="ctrl-scripture-box"><div class="ctrl-scripture-label">Scripture to Read</div><div class="ctrl-scripture-content">${a.scriptureText}</div><div class="ctrl-scripture-ref">${a.scriptureRef}</div></div>`;
  if(a.scripture&&a.type==='teaching')extras+=`<div class="ctrl-scripture-box"><div class="ctrl-scripture-label">On Screen</div><div class="ctrl-scripture-content">${a.scripture}</div><div class="ctrl-scripture-ref">${a.reference}</div></div>`;
  const nt=a.nextTeaser?`<div class="ctrl-preview" style="color:var(--teal);margin-top:4px">\u25B8 Next: \u201C${a.nextTeaser}\u201D</div>`:'';
  document.getElementById('controller-display').innerHTML=`<div class="ctrl-scroll"><div class="ctrl-header"><div class="ctrl-step-badge">${S.act+1} / ${A.length}</div><div class="ctrl-pcount"><span class="counter-icon">\u25CF</span> ${S.pcount}</div></div><div class="ctrl-display-preview"><span>\uD83D\uDCFA</span> ${displayInfo}</div><div class="ctrl-type">${tl[a.type]||''}</div><h2 class="ctrl-title">${a.title||''}</h2>${a.prompt?`<div class="ctrl-preview">\u201C${a.prompt}\u201D</div>`:''}${extras}<div class="ctrl-script-box"><div class="ctrl-script-label">\uD83D\uDCCB Script</div><div class="ctrl-script-text">${esc(a.script||'')}</div></div>${nt}<button id="reset-btn" class="ctrl-reset-btn" onclick="window._resetConfirm()">\u21BA Reset Lesson</button></div><div class="ctrl-buttons"><button class="ctrl-nav-btn back" ${isF?'disabled':''} onclick="window._prev()">\u25C2 Back</button><button class="ctrl-nav-btn next" ${isL?'disabled':''} onclick="window._next()">Next \u25B8</button></div>`;
  // Auto-scroll to top
  const scroll=document.querySelector('.ctrl-scroll');if(scroll)scroll.scrollTop=0;
}

// Participant
function renderPart(){const a=A[S.act];if(!a)return;const area=document.getElementById('participant-display');const done=S.submitted.has(a.id);const teaser=a.nextTeaser?`<p class="p-teaser">${a.nextTeaser}</p>`:'';
  if(a.type==='lobby'){area.innerHTML=`<div class="p-waiting fade-in"><div class="p-check">\u2713</div><h2>You\u2019re In!</h2><p>Waiting for the lesson to begin\u2026</p><div class="p-dots"><span>.</span><span>.</span><span>.</span></div></div>`;return}
  if(a.type==='teaching'||a.type==='closing'||a.type==='photo'||a.type==='scriptureSplit'){area.innerHTML=`<div class="p-waiting fade-in"><div class="p-listen-icon">\uD83D\uDC40</div><h2>Look at the screen</h2><p>Something good is happening\u2026</p>${teaser}</div>`;return}
  if(done){
    // If belonging activity with emoji enabled, show emoji panel
    if(a.emoji){area.innerHTML=`<div class="p-waiting fade-in"><div class="p-check">\u2713</div><h2>Sent!</h2><p>Tap to react as responses are read:</p><div class="emoji-panel"><button class="emoji-btn" onclick="window._emoji('\u2764\uFE0F')">\u2764\uFE0F</button><button class="emoji-btn" onclick="window._emoji('\uD83D\uDE4F')">\uD83D\uDE4F</button><button class="emoji-btn" onclick="window._emoji('\uD83D\uDCAA')">\uD83D\uDCAA</button><button class="emoji-btn" onclick="window._emoji('\uD83D\uDD25')">\uD83D\uDD25</button></div></div>`;return}
    area.innerHTML=`<div class="p-waiting fade-in"><div class="p-check">\u2713</div><h2>Sent!</h2><p>Watch the screen for results\u2026</p>${teaser}</div>`;return}
  if(a.type==='poll'||a.type==='scenario'){let h=`<div class="p-activity fade-in"><p class="p-prompt">${a.prompt}</p><div class="p-options">`;a.options.forEach((o,i)=>{h+=`<button class="p-option-btn" onclick="window._submit('${a.id}','${i}')">${o}</button>`});h+='</div></div>';area.innerHTML=h}
  if(a.type==='wordcloud'){area.innerHTML=`<div class="p-activity fade-in"><p class="p-prompt">${a.prompt}</p><div class="p-input-group"><input type="text" id="p-word" class="p-text-input" placeholder="One word\u2026" maxlength="24" autocomplete="off"><button class="p-submit-btn" onclick="window._submitWord()">Send</button></div></div>`;const inp=document.getElementById('p-word');inp?.focus();inp?.addEventListener('keydown',e=>{if(e.key==='Enter')window._submitWord()})}
  if(a.type==='text'){area.innerHTML=`<div class="p-activity fade-in"><p class="p-prompt">${a.prompt}</p><div class="p-input-group"><textarea id="p-text" class="p-textarea" placeholder="Share your experience\u2026" maxlength="280" rows="3"></textarea><button class="p-submit-btn" onclick="window._submitText()">Send</button></div></div>`;document.getElementById('p-text')?.focus()}
}

// Globals
window._next=()=>advance(1);window._prev=()=>advance(-1);window._submit=(id,v)=>submit(id,v);
window._submitWord=()=>{const i=document.getElementById('p-word');if(!i)return;let v=i.value.trim().split(/\s+/)[0];if(!v)return;submit(A[S.act].id,v.substring(0,24))};
window._submitText=()=>{const i=document.getElementById('p-text');if(!i)return;const v=i.value.trim();if(v.length<2)return;submit(A[S.act].id,v.substring(0,280))};
window._emoji=(e)=>sendEmoji(e);
window._reveal=()=>revealTheme();
window._resetConfirm=()=>{const btn=document.getElementById('reset-btn');if(!btn)return;if(btn.dataset.confirm==='true'){resetSession();btn.dataset.confirm='false';btn.textContent='\u21BA Reset Lesson';btn.classList.remove('confirm')}else{btn.dataset.confirm='true';btn.textContent='Tap again to confirm';btn.classList.add('confirm');setTimeout(()=>{if(btn){btn.dataset.confirm='false';btn.textContent='\u21BA Reset Lesson';btn.classList.remove('confirm')}},3000)}};

// Init
const params=new URLSearchParams(location.search);
const hc=params.get('host'),cc=params.get('control'),jc=params.get('join');
if(hc)rejoinHost(hc);else if(cc)joinCtrl(cc);else if(jc)joinPart(jc);else showScreen('landing-screen');
document.getElementById('btn-host').addEventListener('click',createSession);
document.getElementById('btn-remote').addEventListener('click',()=>{joinMode='controller';document.getElementById('join-title').textContent='Enter Session Code';showScreen('join-screen')});
document.getElementById('btn-join').addEventListener('click',()=>{joinMode='participant';document.getElementById('join-title').textContent='Enter Session Code';showScreen('join-screen')});
document.getElementById('btn-join-submit').addEventListener('click',()=>{const c=document.getElementById('join-code-input').value.trim();if(c.length!==4)return;if(joinMode==='controller')joinCtrl(c);else joinPart(c)});
document.getElementById('join-code-input').addEventListener('keydown',e=>{if(e.key==='Enter'){const c=e.target.value.trim();if(c.length===4){if(joinMode==='controller')joinCtrl(c);else joinPart(c)}}});
</script>
</body>
</html>
